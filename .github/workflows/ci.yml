name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/postgres
      INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/postgres
      INTEGRATION_DATABASE_NAME: insightsphere_test_pytest
      INTEGRATION_ALEMBIC_DATABASE_NAME: insightsphere_test_alembic
      RATE_LIMIT_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run unit pytest (SQLite in-memory)
        run: pytest backend/tests -q --ignore=backend/tests/integration --ignore=backend/tests/manual
      - name: Run integration pytest (real Postgres)
        run: pytest backend/tests/integration -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Static + UI audit tests (node:test)
        working-directory: frontend
        run: node --experimental-strip-types --test --test-isolation=none tests/integration/*.test.mjs tests/ui/*.test.mjs tests/*.test.mjs
      - name: Production build
        working-directory: frontend
        env:
          BACKEND_INTERNAL_URL: https://insightsphere-api-staging.onrender.com
          NEXT_PUBLIC_API_URL: https://insightsphere-api-staging.onrender.com
        run: npm run build